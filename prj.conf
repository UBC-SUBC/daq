# Serial console output for printk() status messages.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Extra stack for SD card initialization and FAT filesystem work.
CONFIG_MAIN_STACK_SIZE=4096

# GPIO support for the SD card chip-select pin.
CONFIG_GPIO=y
CONFIG_I2C=y

# SPI bus and SPI-mode SD card host controller.
CONFIG_SPI=y
CONFIG_SDHC=y

# Expose the SD card as a block disk named "SD".
CONFIG_DISK_ACCESS=y

# Zephyr filesystem API plus FAT support for files on the SD card.
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINT_COUNT=1
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINTS="SD"
